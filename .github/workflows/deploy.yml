name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.10.0
          run_install: false

      # 3️⃣ Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5️⃣ Build  project
      - name: Build project
        run: pnpm run build

      # 6️⃣ Setup Docker
      - name: Setup Docker
        uses: docker/setup-buildx-action@v2

      # 7️⃣ Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 8️⃣ Build & Push Image (versioned)
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/codingbot-app:latest
            ${{ secrets.DOCKER_USERNAME }}/codingbot-app:${{ github.sha }}

      # 9️⃣ Deploy to Azure VM via SSH
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            IMAGE=${{ secrets.DOCKER_USERNAME }}/codingbot-app:${{ github.sha }}
            ENV_FILE_PATH=/opt/codingbot-app/.env

            sudo mkdir -p /opt/codingbot-app
            sudo tee "$ENV_FILE_PATH" > /dev/null << 'EOF'
            ${{ secrets.ENV_FILE }}
            EOF
            sudo chmod 600 "$ENV_FILE_PATH"

            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y docker.io
              sudo systemctl enable --now docker
            fi

            sudo docker pull $IMAGE

            if sudo docker ps -a --format '{{.Names}}' | grep -qx codingbot-app; then
              sudo docker stop codingbot-app
              sudo docker rm codingbot-app
            fi

            sudo docker run -d \
              --restart always \
              --name codingbot-app \
              -p 80:3000 \
              --env-file "$ENV_FILE_PATH" \
              $IMAGE